services:
  db:
    image: postgres:16
    container_name: goit-postgres-hw10
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data_hw10:/var/lib/postgresql/data

  api:
    build: .
    container_name: goit-api-hw10
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data_hw10:
